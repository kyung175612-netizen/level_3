    <!-- 관게 활용 emmet -->
    header>h1+div.right (tab)

        <h1><a href="#"><img src="#" alt="todo"></a></h1>
        <div class="right">
            a.search*2>img

    <!-- table id=t1 2행2열 -->
    table#t1>tr*2>td*2
    table#t1>tr*2>th+td
    <table id="t1">

            <th></th>

        </tr>

    ul.items>li>a>img+span.brand+em.neme+span.price
